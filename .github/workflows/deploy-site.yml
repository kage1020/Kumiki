name: Deploy site

on:
  push:
    branches: [main]
    paths:
      - "spec/**"
      - "guide/**"
      - "examples/**"
      - "design-notes/**"
      - "site/**"
      - "packages/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Builds @strand/site and its workspace deps (runtime bundle, compiler)
      # via Turborepo's `dependsOn: ^build`.
      - run: pnpm exec turbo run build --filter=@strand/site

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site/dist --project-name=strand --branch=main
