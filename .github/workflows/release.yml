name: Release

on:
  push:
    branches: [main]

# Avoid overlapping release runs racing on the same branch.
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write # create the Release PR / tags
  pull-requests: write # open/update the Release PR
  id-token: write # OIDC trusted publishing + provenance signing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing (OIDC) needs npm CLI >= 11.5.1; Node 24 ships an
      # older 11.x, so pin to latest to be safe. No NPM_TOKEN — the id-token
      # below authenticates the publish and signs provenance automatically.
      - run: npm install -g npm@latest

      - run: pnpm install --frozen-lockfile

      # When changesets exist on main, opens/updates a "Version Packages" PR.
      # When that PR is merged (versions bumped, changesets consumed), publishes
      # via OIDC trusted publishing (changeset publish shells out to npm publish).
      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          version: pnpm run version
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
