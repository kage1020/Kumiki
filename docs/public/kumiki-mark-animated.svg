<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Kumiki">
<style>.piece{transform-box:fill-box;transform-origin:center;animation-duration:5.4s;animation-timing-function:cubic-bezier(.45, 0,.25,1);animation-iteration-count:infinite}.left{ animation-name:Left}.right{animation-name:Right}.bottom{animation-name:Bottom}.top{animation-name:Top}@keyframes Left{0%{ transform:translateX(-72px);opacity:0}7%{opacity:1}22%{transform:translateX(3px)}28%,84%{transform:translateX(0);opacity:1}94%,100%{transform:translateX(-72px);opacity:0}}@keyframes Right{0%{transform:translateX(72px);opacity:0}7%{opacity:1}22%{transform:translateX(-3px)}28%,84%{transform:translateX(0);opacity:1}94%,100%{transform:translateX(72px);opacity:0}}@keyframes Bottom{0%{transform:translateY(72px);opacity:0;}7%{opacity:1}22%{transform:translateY(-3px)}28%,84%{transform:translateY(0);opacity:1}94%,100%{transform:translateY(72px);opacity:0}}@keyframes Top{0%{ transform:translateY(-72px);opacity:0}7%{opacity:1}22%{transform:translateY(3px)}28%,84%{transform:translateY(0);opacity:1}94%,100%{transform:translateY(-72px);opacity:0}}@media(prefers-reduced-motion:reduce){.piece{animation:none;transform:none;opacity:1}}</style><rect class="piece top" x="10" y="10" width="34" height="12" rx="2" fill="#13d6c4" style="animation-delay:.72s"/><rect class="piece top" x="48" y="10" width="42" height="12" rx="2" fill="#13d6c4" opacity=".8" style="animation-delay:.60s"/><rect class="piece left" x="10" y="26" width="24" height="24" rx="2" fill="#7b61ff" opacity=".85" style="animation-delay:.44s"/><rect class="piece bottom" x="38" y="26" width="30" height="24" rx="2" fill="#13d6c4" style="animation-delay:.34s"/><rect class="piece right" x="72" y="26" width="18" height="24" rx="2" fill="#7b61ff" style="animation-delay:.24s"/><rect class="piece left" x="10" y="54" width="48" height="36" rx="2" fill="#1a1830" style="animation-delay:.10s"/><rect class="piece right" x="62" y="54" width="28" height="36" rx="2" fill="#7b61ff" style="animation-delay:0s"/></svg>
